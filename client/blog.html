<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blog - EduScale</title>
    <meta name="description" content="Explore coding, AI, and tech blogs.">
    <link rel="stylesheet" href="./css/style.css">
    <script src="data.js"></script>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">EduScale.</a>
    </nav>

    <main class="container">
        <h1>Latest Blogs</h1>

        <div id="blog-container" class="course-grid"></div>
    </main>

    <script>
        const container = document.getElementById("blog-container");

        blogs.forEach(blog => {
            container.innerHTML += `
      <div class="course-card">
        <img src="${blog.image}" class="course-image">
        <h3 class="course-title">${blog.title}</h3>
        <p class="course-desc">${blog.description}</p>
        <a href="/blog/${blog.slug}" class="btn">Read More</a>
      </div>
    `;
        });
    </script>

</body>

</html>
